name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: windows-latest
            binary: target/release/xdx-gui.exe
            asset_name: xdx-gui-windows-x86_64.exe
            archive: xdx-gui-windows-x86_64.exe
          - os: macos-latest
            binary: target/release/xdx-gui
            asset_name: xdx-gui-macos-x86_64
            archive: xdx-gui-macos-x86_64.tar.gz
          - os: ubuntu-latest
            binary: target/release/xdx-gui
            asset_name: xdx-gui-linux-x86_64
            archive: xdx-gui-linux-x86_64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libxkbcommon-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build -p xdx-gui --release

      - name: Rename binary
        shell: bash
        run: cp ${{ matrix.binary }} ${{ matrix.asset_name }}

      - name: Archive binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: tar czf ${{ matrix.archive }} ${{ matrix.asset_name }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
